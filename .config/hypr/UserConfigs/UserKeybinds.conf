# visit https://wiki.hyprland.org/Configuring/Binds/ for more info
# See https://wiki.hyprland.org/Configuring/Keywords/ for more settings and variables
# See also Laptops.conf for laptops keybinds 

# MODIFIER
$mainMod = SUPER

# SCRIPT VARS
$scriptsDir = $HOME/.config/hypr/scripts
$UserConfigs = $HOME/.config/hypr/UserConfigs
$UserScripts = $HOME/.config/hypr/UserScripts

bind = CTRL SHIFT ALT, Delete, exec, hyprctl dispatch exit 0
bind = $mainMod, q, killactive, #kill
bind = $mainMod SHIFT, q, exec, $scriptsDir/KillActiveProcess.sh # Kill active process
bind = CTRL SHIFT ALT, L, exec, $scriptsDir/LockScreen.sh # screen lock
bind = CTRL SHIFT ALT, P, exec, $scriptsDir/Wlogout.sh # power menu
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw # swayNC notification panel

# Master Layout
# bind = $mainMod CTRL, D, layoutmsg, removemaster
# bind = $mainMod, I, layoutmsg, addmaster
# bind = $mainMod, J, layoutmsg, cyclenext
# bind = $mainMod, K, layoutmsg, cycleprev
# bind = $mainMod CTRL, M, layoutmsg, swapwithmaster

# Dwindle Layout
bind = $mainMod SHIFT, V, togglesplit # only works on dwindle layout
bind = $mainMod SHIFT, D, pseudo, # dwindle

# Works on either layout (Master or Dwindle)
# bind = $mainMod, Y, exec, hyprctl dispatch splitratio 0.3

# group
bind = $mainMod, G, togglegroup # toggle group
bind = $mainMod CTRL, tab, changegroupactive  # change focus to another window

# Cycle windows if floating bring to top
bind = ALT, tab, cyclenext
bind = ALT, tab, bringactivetotop  

# Special Keys / Hot Keys
bindel = , xf86audioraisevolume, exec, $scriptsDir/Volume.sh --inc # volume up
bindel = , xf86audiolowervolume, exec, $scriptsDir/Volume.sh --dec # volume down
bindl = , xf86AudioMicMute, exec, $scriptsDir/Volume.sh --toggle-mic # mic mute
bindl = , xf86audiomute, exec, $scriptsDir/Volume.sh --toggle # mute
bindl = , xf86Sleep, exec, systemctl suspend  # sleep button 
bindl = , xf86Rfkill, exec, $scriptsDir/AirplaneMode.sh # Airplane mode

# media controls using keyboards
bindl = , xf86AudioPlayPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPause, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioPlay, exec, $scriptsDir/MediaCtrl.sh --pause
bindl = , xf86AudioNext, exec, $scriptsDir/MediaCtrl.sh --nxt 
bindl = , xf86AudioPrev, exec, $scriptsDir/MediaCtrl.sh --prv
bindl = , xf86audiostop, exec, $scriptsDir/MediaCtrl.sh --stop

# Screenshot keybindings NOTE: You may need to press Fn key as well
bind = $mainMod, Print, exec, $scriptsDir/ScreenShot.sh --now  # screenshot
bind = $mainMod SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --area # screenshot (area)
bind = $mainMod CTRL, Print, exec, $scriptsDir/ScreenShot.sh --in5 # screenshot  (5 secs delay)
bind = $mainMod CTRL SHIFT, Print, exec, $scriptsDir/ScreenShot.sh --in10 # screenshot (10 secs delay)
bind = ALT, Print, exec, $scriptsDir/ScreenShot.sh --active # screenshot (active window only)

# screenshot with swappy (another screenshot tool)
bind = $mainMod SHIFT, S, exec, $scriptsDir/ScreenShot.sh --swappy #screenshot (swappy)

# Move windows 
# works also on floating windows and act the same as swap windows when window is not floating
bind = $mainMod CTRL, left, movewindow, l 
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up, movewindow, u
bind = $mainMod CTRL, down, movewindow, d

# Swap windows
bind = $mainMod ALT, j, swapwindow, l
bind = $mainMod ALT, k, swapwindow, d
bind = $mainMod ALT, l, swapwindow, u
bind = $mainMod ALT, p, swapwindow, r

bind = $mainMod, j, movefocus, l
bind = $mainMod, k, movefocus, d
bind = $mainMod, l, movefocus, u
bind = $mainMod, p, movefocus, r

# Resize windows
binde = $mainMod SHIFT, j, resizeactive,-50 0
binde = $mainMod SHIFT, k, resizeactive,0 -50
binde = $mainMod SHIFT, l, resizeactive,0 50
binde = $mainMod SHIFT, p, resizeactive,50 0

# Move windows
bindd = $mainMod CTRL, j, move window left, movewindow, l
bindd = $mainMod CTRL, p, move window right, movewindow, r
bindd = $mainMod CTRL, l, move window up, movewindow, u
bindd = $mainMod CTRL, k, move window down, movewindow, d

# Workspaces Related

# Skims through all active workspaces that have windows in them
bind = $mainMod, tab, exec, $UserScripts/ActiveWorkspaces.sh next
bind = $mainMod SHIFT, tab, exec, $UserScripts/ActiveWorkspaces.sh prev

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow #  mouse:272 = left click
bindm = $mainMod, mouse:273, resizewindow # mouse:272 = right click

# Special workspace
bind = $mainMod SHIFT, U, movetoworkspace, special
bind = $mainMod, U, togglespecialworkspace,

# For single monitor workspaces

# The following mappings use the key codes to better support various keyboard layouts
# Switch workspaces with mainMod + [0-9] 
# bind = $mainMod , code:10, workspace, 1 
# bind = $mainMod , code:11, workspace, 2 
# bind = $mainMod , code:12, workspace, 3 
# bind = $mainMod , code:13, workspace, 4 
# bind = $mainMod , code:14, workspace, 5 
# bind = $mainMod , code:15, workspace, 6 
# bind = $mainMod , code:16, workspace, 7 
# bind = $mainMod , code:17, workspace, 8 
# bind = $mainMod , code:18, workspace, 9 
# bind = $mainMod , code:19, workspace, 10
#
# # Move active window and follow to workspace mainMod + SHIFT [0-9]
# bind = $mainMod SHIFT, code:10, movetoworkspace, 1 
# bind = $mainMod SHIFT, code:11, movetoworkspace, 2 
# bind = $mainMod SHIFT, code:17, movetoworkspace, 3 
# bind = $mainMod SHIFT, code:16, movetoworkspace, 4 
# bind = $mainMod SHIFT, code:12, movetoworkspace, 5 
# bind = $mainMod SHIFT, code:15, movetoworkspace, 6 
# bind = $mainMod SHIFT, code:14, movetoworkspace, 7 
# bind = $mainMod SHIFT, code:13, movetoworkspace, 8 
# bind = $mainMod SHIFT, code:18, movetoworkspace, 9 
# bind = $mainMod SHIFT, code:19, movetoworkspace, 10
# bind = $mainMod SHIFT, bracketleft, movetoworkspace, -1 # brackets [
# bind = $mainMod SHIFT, bracketright, movetoworkspace, +1 # brackets ]
#
# # Move active window to a workspace silently mainMod + CTRL [0-9]
# bind = $mainMod CTRL, code:10, movetoworkspacesilent, 1 # code:10 = key 1
# bind = $mainMod CTRL, code:11, movetoworkspacesilent, 2 # code:11 = key 2
# bind = $mainMod CTRL, code:12, movetoworkspacesilent, 3 # code:12 = key 3
# bind = $mainMod CTRL, code:13, movetoworkspacesilent, 4 # code:13 = key 4
# bind = $mainMod CTRL, code:14, movetoworkspacesilent, 5 # code:14 = key 5
# bind = $mainMod CTRL, code:15, movetoworkspacesilent, 6 # code:15 = key 6
# bind = $mainMod CTRL, code:16, movetoworkspacesilent, 7 # code:16 = key 7
# bind = $mainMod CTRL, code:17, movetoworkspacesilent, 8 # code:17 = key 8
# bind = $mainMod CTRL, code:18, movetoworkspacesilent, 9 # code:18 = key 9
# bind = $mainMod CTRL, code:19, movetoworkspacesilent, 10 # code:19 = key 0
# bind = $mainMod CTRL, bracketleft, movetoworkspacesilent, -1 # brackets [
# bind = $mainMod CTRL, bracketright, movetoworkspacesilent, +1 # brackets ]

# For multiple monitors - Split-workspaces plugin 

# Move active window to the other monitor 
bind = $mainMod shift, i, split-changemonitor, next
bind = $mainMod, i, split-changemonitorsilent, next 

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, code:10, split-workspace, 1
bind = $mainMod, code:11 , split-workspace, 2
bind = $mainMod, code:12 , split-workspace, 3
bind = $mainMod, code:13 , split-workspace, 4
bind = $mainMod, code:14 , split-workspace, 5
bind = $mainMod, code:15 , split-workspace, 6
bind = $mainMod, code:16 , split-workspace, 7
bind = $mainMod, code:17 , split-workspace, 8
bind = $mainMod, code:18 , split-workspace, 9
bind = $mainMod, code:19 , split-workspace, 10

bind = $mainMod SHIFT, code:10, split-movetoworkspace, 1 
bind = $mainMod SHIFT, code:11, split-movetoworkspace, 2 
bind = $mainMod SHIFT, code:17, split-movetoworkspace, 3 
bind = $mainMod SHIFT, code:16, split-movetoworkspace, 4 
bind = $mainMod SHIFT, code:12, split-movetoworkspace, 5 
bind = $mainMod SHIFT, code:15, split-movetoworkspace, 6 
bind = $mainMod SHIFT, code:14, split-movetoworkspace, 7 
bind = $mainMod SHIFT, code:13, split-movetoworkspace, 8 
bind = $mainMod SHIFT, code:18, split-movetoworkspace, 9 
bind = $mainMod SHIFT, code:19, split-movetoworkspace, 10

# Move active window to a workspace silently with mainMod + CTRL + [0-9]
bind = $mainMod CTRL, 1, split-movetoworkspacesilent, 1
bind = $mainMod CTRL, 2, split-movetoworkspacesilent, 2
bind = $mainMod CTRL, 3, split-movetoworkspacesilent, 3
bind = $mainMod CTRL, 4, split-movetoworkspacesilent, 4
bind = $mainMod CTRL, 5, split-movetoworkspacesilent, 5
bind = $mainMod CTRL, 6, split-movetoworkspacesilent, 6
bind = $mainMod CTRL, 7, split-movetoworkspacesilent, 7
bind = $mainMod CTRL, 8, split-movetoworkspacesilent, 8
bind = $mainMod CTRL, 9, split-movetoworkspacesilent, 9
bind = $mainMod CTRL, 0, split-movetoworkspacesilent, 10

# DEFAULT VARS
$files = thunar
$code = code --use-gl=desktop
# $spotify = env LD_PRELOAD=/usr/lib/spotify-adblock.so spotify --uri=%U # spotify no ads
# $spotube = [float] spotube
$files = thunar /home/maya/Downloads/

# COMMON SHORTCUTS
#bindr = $mainMod, $mainMod_L, exec, pkill rofi || rofi -show drun -modi drun,filebrowser,run,window # Super Key to Launch rofi menu
bind = $mainMod, n, exec, pkill rofi || true && rofi -show drun -modi drun,filebrowser,run,window # Main Menu (APP Launcher)
# bind = $mainMod, ???, exec, xdg-open "http:// &"  # default browser
# bindd = $mainMod, A, desktop overview, exec, $scriptsDir/OverviewToggle.sh # toggles quickshell or ags overview (tries QS first, falls back to AGS)
# bindd = $mainMod, A, Quickshell overview, global, quickshell:overviewToggle
# bind = $mainMod, A, global, quickshell:overviewToggle # desktop overview 
bind = $mainMod, A, exec, qs ipc -c overview call overview toggle

bind = $mainMod, Return, exec, foot  
bind = $mainMod, comma, exec, kitty  
bind = $mainMod, E, exec, $files 

# WAYBAR 
bind = $mainMod, B, exec, pkill -SIGUSR1 waybar # Toggle hide/show waybar 
bind = $mainMod CTRL, B, exec, $scriptsDir/WaybarStyles.sh # Waybar Styles Menu 
bind = $mainMod ALT, B, exec, $scriptsDir/WaybarLayout.sh # Waybar Layout Menu

# FEATURES / EXTRAS
bind = $mainMod SHIFT, H, exec, $scriptsDir/KeyHints.sh # help / cheat sheet
bind = $mainMod ALT, R, exec, $scriptsDir/Refresh.sh # Refresh waybar, swaync, rofi
bind = $mainMod ALT, E, exec, $scriptsDir/RofiEmoji.sh # emoji menu
bind = $mainMod, semicolon, exec, $scriptsDir/RofiSearch.sh # Google search using rofi
bind = $mainMod SHIFT, B, exec, $scriptsDir/ChangeBlur.sh # Toggle blur settings 
bind = $mainMod SHIFT, G, exec, $scriptsDir/GameMode.sh # Toggle animations ON/OFF
bind = $mainMod ALT, L, exec, $scriptsDir/ChangeLayout.sh # Toggle Master or Dwindle Layout
bind = $mainMod ALT, V, exec, $scriptsDir/ClipManager.sh # Clipboard Manager
bind = $mainMod CTRL, R, exec, $scriptsDir/RofiThemeSelector.sh # KooL Rofi Menu Theme Selector
# bind = $mainMod CTRL SHIFT, R, exec, pkill rofi || true && $scriptsDir/RofiThemeSelector-modified.sh # modified Rofi Theme Selector

bind = $mainMod, F, fullscreen
bind = $mainMod SHIFT, F, togglefloating, 
bind = $mainMod CTRL, F, fullscreen, 1 # fake full screen
# bind = $mainMod ALT, F, exec, hyprctl dispatch workspaceopt allfloat #all Float Mode

# FEATURES / EXTRAS (UserScripts)
# bind = $mainMod, period, exec, $UserScripts/Kool_Quick_Settings.sh # Settings Menu KooL Hyprland Settings
bindd = $mainMod, period, Quick settings menu, exec, $scriptsDir/Kool_Quick_Settings.sh
bind = $mainMod, period, exec, $UserScripts/RofiBeats.sh # online music using rofi
bind = $mainMod SHIFT, M, exec, $UserScripts/RofiBeats.sh # online music using rofi
bind = $mainMod, W, exec, $UserScripts/WallpaperSelect.sh # Select wallpaper to apply
bind = $mainMod SHIFT, W, exec, $UserScripts/WallpaperEffects.sh # Wallpaper Effects by imagemagick
bind = CTRL ALT, W, exec, $UserScripts/WallpaperRandom.sh # Random wallpapers
bind = $mainMod CTRL, O, exec, hyprctl setprop active opaque toggle # disable opacity on active window
bind = $mainMod CTRL, Return, exec, $scriptsDir/KeyBinds.sh # search keybinds via rofi
bind = $mainMod SHIFT, A, exec, $scriptsDir/Animations.sh #hyprland animations menu
# bind = $mainMod SHIFT, O, exec, $UserScripts/ZshChangeTheme.sh # Change oh-my-zsh theme 
# bindln = ALT_L SHIFT_L, K, exec, $scriptsDir/SwitchKeyboardLayout.sh # Change keyboard layout
# bind = $mainMod ALT, C, exec, $UserScripts/RofiCalc.sh # calculator (qalculate)

# pyprland (This is not available in Debian and Ubuntu)
bind = $mainMod SHIFT, Return, exec, pypr toggle term # Dropdown terminal not avail Debian and Ubuntu
bind = $mainMod, Z, exec, pypr zoom # Toggle Desktop Zoom

# For passthrough keyboard into a VM
# bind = $mainMod ALT, P, submap, passthru
#submap = passthru
# to unbind
#bind = $mainMod ALT, P, submap, reset
#submap = reset

# Manually added
bind = $mainMod, M, exec, blueman-manager
# bind = $mainMod, Space, exec, $spotify 
bind = $mainMod SHIFT, BACKSPACE, exec, $UserScripts/ToggleZeroBrightness.sh
bind = $mainMod, Y, exec, $UserScripts/OpenGithub.sh
